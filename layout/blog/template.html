    <h1>Two Research Assistants Recognized for Student Research in Topological Data Analysis</h1>
    <div class="post-meta">
      Mar 29, 2026 • 5 min read • by AMaDaS Research Group
      <!-- Share Facebook -->
      <button type="button" class="share-facebook" data-postid="post-05">
       <i class="fa-brands fa-facebook"></i> Facebook
      </button>
    </div>

    <p>
      At the Student Scientific Research Conference of the Faculty of Mathematics and Computer Science for the academic year 2025–2026, Ho Chi Minh City University of Education, two good student research projects were awarded the Encouragement Prize, highlighting the strong development of modern mathematical and data-driven research. Both students, Nguyen Minh Khoi and Pham Quang Loc, are members of the Applied Mathematics and Data Science Research Group, under the supervision of Dr. Bui Quang Thinh, the head of the research group.
    </p>
   

  
      <p>
        The first project, <i>“Applications of Topological Data Analysis in Healthcare Time Series”</i> by Nguyen Minh Khoi, investigates the application of Topological Data Analysis (TDA) to complex healthcare time series data. The study employs advanced topological representations such as Euler Characteristic Curves (ECC), Persistence Landscapes (LSP), and Zigzag Persistence (ZZP) to uncover intrinsic structural patterns in noisy temporal data. Experimental results demonstrate that topological features, particularly ZZP, provide more robust and stable clustering performance compared to traditional methods  . This research highlights the potential of TDA in supporting healthcare analytics and decision-making.
      </p>
   
          <figure class="post-figure">
      <img src="/img/blog/Khoi_Loc/Khoi.jpg" alt="Nguyen Minh Khoi presenting his research on Topological Data Analysis in healthcare time series." loading="lazy" />
      <figcaption class="post-caption">
        Nguyen Minh Khoi presenting his research on Topological Data Analysis in healthcare time series.
      </figcaption>
    </figure>

    
    <p>
        The second project, <i>“Mathematical Framework for Agglomerative Clustering Based on Topological Relations”</i> by Pham Quang Loc, focuses on developing a rigorous theoretical foundation for clustering methods based on topological relations. The study revisits and extends the ACUTE algorithm within a general topological framework, clarifying its connections with key TDA tools such as simplicial complexes, Ball Mapper, and density-based clustering methods like DBSCAN  . This work contributes to a deeper theoretical understanding of topology-driven clustering and enhances its applicability to complex and non-convex datasets
      </p>
<figure class="post-figure">
      <img src="/img/blog/Khoi_Loc/loc.jpg" alt="Pham Quang Loc presenting his work on topological-based agglomerative clustering." loading="lazy" />
      <figcaption class="post-caption">
        Pham Quang Loc presenting his work on topological-based agglomerative clustering.
      </figcaption>
    </figure>
      <p>
        In addition to their achievements at the conference, both students are also co-authors of a research paper presented at the 18th Asian Conference on Intelligent Information and Database Systems (ACIIDS 2026), held in Kaohsiung, Taiwan (April 13–15, 2026). The paper, entitled “Topology-Driven Rough Set Classification Using Ball Mapper Coverings for Healthcare Intelligence”, reflects their continued contributions to the field of topology-based data analysis  .
      </p>
      <p>
        These accomplishments not only demonstrate the students’ research capabilities but also affirm the growing impact of topology-driven approaches in modern data science, bridging theoretical foundations with real-world applications.
        </p>

    </footer>
  </article>

    <h1>Provincial Science and Technology Project on AI-Based Breast Cancer Diagnosis</h1>
    <div class="post-meta">
      Mar 29, 2026 • 5 min read • by AMaDaS Research Group
      <!-- Share Facebook -->
      <button type="button" class="share-facebook" data-postid="post-04">

    <p>
      On March 24, 2026, Dong Thap Department of Science and Technology convened a selection council meeting to evaluate a proposed provincial-level research project titled <strong>“Development of an Artificial Intelligence (AI) Model for Breast Cancer Diagnosis from Mammography and Preliminary Evaluation of Its Application Effectiveness”</strong>. The project is led by Dr. Bui Quang Thinh from the AMaDaS Research Group, Tien Giang University.
    </p>
   
    <figure class="post-figure">
      <img src="/img/blog/UngThuNhu/1.jpg" alt=" Specialist Level II Doctor Nguyen Van Linh." loading="lazy" />
      <figcaption class="post-caption">
        Dr. Bui Quang Thinh, the principal investigator, is presenting the project report at the meeting.      </figcaption>
    </figure>
    <p>
      The research team includes MSc. Nguyen Thanh Nha (scientific secretary), Dr. Duong Van Hieu, Specialist Doctor Vo Giap Hung, and MSc. Huynh Van Hiep. The project will be carried out in collaboration with key partners, including Tien Giang General Hospital, Dong Thap General Hospital, and TVT Medical Joint Stock Company, ensuring both scientific rigor and practical applicability.
    </p>
   <figure class="post-figure-group">
    <div class="post-figure-grid">
      <figure class="post-figure">
        <img src="/img/blog/UngThuNhu/2.jpg" alt="Dr. Lam Dong Phong." loading="lazy" />
      </figure>

      <figure class="post-figure">
        <img src="/img/blog/UngThuNhu/3.jpg" alt="Associate Professor Dr. Hoang Van Dung." loading="lazy" />
      </figure>

      <figure class="post-figure">
        <img src="/img/blog/UngThuNhu/4.jpg" alt="Dr. Nguyen Van Linh." loading="lazy" />
      </figure>

      <figure class="post-figure">
        <img src="/img/blog/UngThuNhu/5.jpg" alt="Dr. Le Hoang Hanh." loading="lazy" />
      </figure>
    </div>

      <figcaption class="post-caption post-caption-group">
        Dr. Lam Dong Phong (Can Tho University of Medicine and Pharmacy), Assoc. Prof. Dr. Hoang Van Dung<br> (Ho Chi Minh City University of Technology and Education), Dr. Nguyen Van Linh (Dong Thap Department of Health), <br>and Dr. Le Hoang Hanh (Tien Giang General Hospital) delivered remarks assessing the feasibility of the project <br>and proposing directions for its successful implementation.
      </figcaption>
  </figure>
      <p>
      The selection council was chaired by Dr. Le Quang Khoi, Director of Dong Thap Department of Science and Technology, with MSc. Nguyen Van Dam as Vice director, serving as Vice Chairman. The council also included experts and reviewers from leading institutions such as Can Tho University of Medicine and Pharmacy and Ho Chi Minh City University of Technology and Education, along with representatives from the provincial Department of Health. 
      </p>
    
       <p>
        According to Dr. Bui Quang Thinh, the project addresses the growing demand for artificial intelligence applications in healthcare, particularly in breast cancer imaging diagnosis—one of the leading causes of morbidity and mortality among women. Current mammography interpretation relies heavily on radiologists’ experience, which may result in missed early-stage lesions or diagnostic inconsistencies.
      </p>
      <figure class="post-figure-group">
          <div class="post-figure-grid post-figure-grid-2">
            <figure class="post-figure">
              <img src="/img/blog/UngThuNhu/6.jpg" alt="MSc. Phan Ha" loading="lazy" />
            </figure>

            <figure class="post-figure">
              <img src="/img/blog/UngThuNhu/7.jpg" alt="Le Hong Chau." loading="lazy" />
            </figure>
          </div>

          <figcaption class="post-caption post-caption-group">
            MSc. Phan Ha (Head of the Science Management Division, Dong Thap Department of Science and Technology) and Mr. Le Hong Chau<br> (Deputy Chief of Office, Dong Thap Department of Science and Technology) delivered remarks, highlighting key directions to be clarified <br>to ensure the effective implementation of the project.
          </figcaption>
        </figure>
      <p>
        The project aims to develop an advanced AI model capable of supporting physicians in breast cancer diagnosis from mammography images with high accuracy. It also seeks to conduct a preliminary evaluation of the system’s effectiveness in real clinical settings at partner hospitals. Key objectives include building a high-quality, well-annotated mammography dataset; developing robust AI models for lesion detection and classification; integrating explainable AI mechanisms to enhance transparency; and deploying pilot applications in clinical environments.
      </p>
    
      <p>
        During the evaluation session, the council reviewed the proposal through presentations, discussions, and critical assessments. The members highly appreciated the scientific significance and practical value of the project, particularly in the context of the rapid adoption of AI across multiple sectors. The project was approved with a score of 80.6.
      </p>

       <p>
        The council also provided recommendations for further refinement, including reconsidering the sample size to ensure representativeness, adjusting the project timeline, and expanding the data collection scope to enhance applicability. Additionally, the project title was suggested to be revised to better reflect the implementation context, resulting in the updated title: “Development of an Artificial Intelligence (AI) Model for Breast Cancer Diagnosis from Mammography and Preliminary Evaluation of Its Application Effectiveness in Dong Thap Province.”
      </p>
    <figure class="post-figure">
      <img src="/img/blog/UngThuNhu/11.jpg" alt=" Dr. Lam Dong Phong." loading="lazy" />
      <figcaption class="post-caption">

      </figure>
      <p>
        Overall, the project represents a significant step toward integrating AI into healthcare practice, contributing to earlier detection and improved diagnostic accuracy for breast cancer in Vietnam.
      </p>

    <p>
      In March 2026, the research group continued to achieve significant academic milestones with multiple research papers accepted in high-impact journals and prestigious international conferences. These outcomes demonstrate the group’s sustained contributions across decision-making under uncertainty, medical image analysis, fuzzy systems, and topological data analysis.
    </p>

    <p>
      On early March 2026, the manuscript <strong>Novel Neutrosophic Fuzzy Decision-Making Approach Based on Distance from the Average Solution under Uncertainty</strong> was accepted for publication in <i>Engineering Applications of Artificial Intelligence (SCIE/Q1 journal)</i>. The study proposes an advanced neutrosophic fuzzy decision-making framework that enhances robustness in handling uncertainty in complex decision environments.
    </p>
    
     <p>
      The group also recorded success in applied data-driven research with the manuscript <strong>A Novel Farm-level Dataset and Real-Time Detection Framework for Shrimp Black Spot Disease</strong>, accepted for presentation at the <i>2026 IEEE-International Conference on Connected Innovation and Technology</i> (IEEE-ICCITX.0 2026) in France, Vietnam, and Morocco (Scopus indexed). This work introduces a real-time detection system supported by a newly constructed dataset for aquaculture disease monitoring.
    </p>
  <figure class="post-figure">

      </figcaption>

      <p>

      </p>

      <p>
