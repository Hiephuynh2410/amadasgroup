  <article class="post">
    <h1>AMaDaS Research Group at ICCIES 2026 and ACIIDS 2026</h1>
    <div class="post-meta">
      Apr 13, 2026 • 5 min read • by AMaDaS Research Group
      <button type="button" class="share-facebook" data-postid="post-06">
       <i class="fa-brands fa-facebook"></i> Facebook
      </button>
    </div>

    <p>
      Members of the AMaDaS Research Group actively participated in two international conferences: the 2nd International Conference on Computational Intelligence in Engineering Science (ICCIES 2026), held from April 02–04, 2026 in Nha Trang, Vietnam, and the 18th Asian Conference on Intelligent Information and Database Systems (ACIIDS 2026), held from April 13–15, 2026 in Kaohsiung, Taiwan. These events provided opportunities to present recent research results and engage with the international scientific community in computational intelligence and data science.  
    </p>

    <figure class="post-figure">
      <img src="/img/blog/ACIIDS_2026/khang1.jpg" alt="Le Nguyen Nguyen Khang presenting his research at ICCIES 2026 and extending birthday wishes to Prof. Bay Vo, his supervisor." loading="lazy" />
      <figcaption class="post-caption">
        Le Nguyen Nguyen Khang presenting his research at ICCIES 2026 and extending birthday wishes to Prof. Bay Vo, his supervisor.
      </figcaption>
    </figure>

    <p>
    At ICCIES 2026, the group contributed to a research paper entitled <i>“A Novel Zigzag-Persistence-Based Framework for Topology-Enhanced Time-Series Forecasting”</i>, co-authored by Khang N. N. Le, Bay Vo, and Quang-Thinh Bui  . The study proposes a topology-enhanced forecasting framework that integrates FastZigzag persistence into the N-BEATS architecture to capture dynamic topological evolution in time series. Experimental results demonstrate significant improvements, achieving approximately 43.8% reduction in MAE and 42.0% reduction in RMSE compared to baseline approaches  .  
    </p>

     <figure class="post-figure">
      <img src="/img/blog/ACIIDS_2026/aciids1.jpg" alt="" loading="lazy" />
      <figcaption class="post-caption">
        Members of the AMaDaS Research Group at ACIIDS 2026.
      </figcaption>
    </figure>

    <p>
      At ACIIDS 2026, the AMaDaS Research Group presented the paper <i>“Topology-Driven Rough Set Classification Using Ball Mapper Coverings for Healthcare Intelligence”</i>, co-authored by Quang-Thinh Bui, Quang-Loc Pham, Minh-Khoi Pham, Minh-Huy Bui, Phu Pham, and Bay Vo. The work was published in the Springer proceedings Intelligent Information and Database Systems, reflecting its academic contribution and international recognition.
    </p>
   
    <figure class="post-figure">
      <img src="/img/blog/ACIIDS_2026/accids3.jpg" alt="" loading="lazy" />
      <figcaption class="post-caption">
        Dr. Bui Quang Thinh presenting on behalf of the AMaDaS Research Group at ACIIDS 2026.
      </figcaption>
    </figure>

    <p>
     The study introduces a topology-driven classification framework that integrates the Ball Mapper algorithm into covering-based rough set theory. By constructing projection-free coverings directly in the original data space, the proposed approach improves both stability and interpretability in classification tasks. Experimental results on multiple healthcare datasets show strong and consistent performance, with classification quality scores reaching up to 0.971 on the Fetal Health dataset and 0.943 on Lung Cancer data.
    </p>

    <p>
    Participation in ACIIDS 2026 provided an opportunity for the AMaDaS Research Group to engage with the international research community and exchange ideas. It also marks an important step in connecting student-led research activities with broader academic collaborations and global research trends.
    </p>

     <figure class="post-figure">
      <img src="/img/blog/ACIIDS_2026/accids2.jpg" alt="" loading="lazy" />
      <figcaption class="post-caption">
         The AMaDaS Research Group with professors and participants at the end of the presentation session.
      </figcaption>
    </figure>

    <p>
      In addition, Dr. Bui Quang Thinh, head of the research group, is also a co-author of another paper presented at ACIIDS 2026, entitled <i>“Fast-NSTBC: A Scalable Topological-Based Clustering Method for Large Network-Constrained Geospatial Data”</i>. This work focuses on improving the efficiency of topology-based clustering methods for large-scale geospatial data, achieving significant reductions in computational cost and memory usage while maintaining clustering quality.
    </p>

    <p>
    Overall, the group’s participation in ICCIES 2026 and ACIIDS 2026 highlights the growing impact of topology-driven approaches in modern data science. It also demonstrates the ability to bridge advanced mathematical foundations with real-world applications across multiple domains.  
    </p>

    <h1>Research Assistants Recognized for Topology-Driven Student Projects</h1>
    <div class="post-meta">
      Apr 21, 2026 • 5 min read • by AMaDaS Research Group
      <!-- Share Facebook -->
      <button type="button" class="share-facebook" data-postid="post-05">
       <i class="fa-brands fa-facebook"></i> Facebook
      </button>
    </div>

    <p>
    At the Student Scientific Research Conference of the Faculty of Mathematics and Computer Science for the academic year 2025–2026, Ho Chi Minh City University of Education, two student research projects were awarded the <i>Encouragement Prize</i>, while another project received the <i>Third Prize</i>, highlighting the growing strength of modern mathematical and data-driven research. All three students, Pham Minh Khoi, Pham Quang Loc, and Nguyen Hoang Khoi, are members of the AMaDaS Research Group, under the supervision of Dr. Bui Quang Thinh, the head of the research group.
  
    </p>
   
      <p>
        The first project, <i>“Applications of Topological Data Analysis in Healthcare Time Series”</i> by Pham Minh Khoi, investigates the application of Topological Data Analysis (TDA) to complex healthcare time series data. It employs advanced topological representations such as Euler Characteristic Curves (ECC), Persistence Landscapes (LSP), and Zigzag Persistence (ZZP) to uncover intrinsic structural patterns in noisy temporal data. Experimental results show that topological features, particularly ZZP, provide more robust and stable clustering performance compared to traditional methods, highlighting the potential of TDA in healthcare analytics and decision-making.
      </p>
   
      <figure class="post-figure">
      <img src="/img/blog/Khoi_Loc/Khoi.jpg" alt="Pham Minh Khoi presenting his research on Topological Data Analysis in healthcare time series." loading="lazy" />
      <figcaption class="post-caption">
        Pham Minh Khoi presenting his research on Topological Data Analysis in healthcare time series.
      </figcaption>
    </figure>

    
    <p>
      The second project, <i>“Mathematical Framework for Agglomerative Clustering Based on Topological Relations”</i> by Pham Quang Loc, focuses on developing a rigorous theoretical foundation for clustering methods based on topological relations. The work revisits and extends the ACUTE algorithm within a general topological framework, clarifying its connections with key TDA tools such as simplicial complexes, Ball Mapper, and density-based methods such as DBSCAN. This contributes to a deeper understanding of topology-driven clustering and improves its applicability to complex and non-convex datasets.
      </p>

    <figure class="post-figure">
      <img src="/img/blog/Khoi_Loc/loc.jpg" alt="Pham Quang Loc presenting his work on topological-based agglomerative clustering." loading="lazy" />
      <figcaption class="post-caption">
        Pham Quang Loc presenting his work on topological-based agglomerative clustering.
      </figcaption>
    </figure>

    <i>
      The third project, <i>“Sheaf Neural Networks: A Topological Foundation for Structured Representation Learning”<i> by Nguyen Hoang Khoi and collaborators, explores the integration of sheaf-theoretic concepts into neural network models for structured data. By incorporating topological consistency across data structures, the work offers a novel perspective on representation learning and contributes to the growing intersection between topology and machine learning.
    </p>
      <figure class="post-figure">
      <img src="/img/blog/Khoi_Loc/khoi2.jpg" alt="Nguyen Hoang Khoi and collaborators presenting their project on sheaf neural networks for structured representation learning." loading="lazy" />
      <figcaption class="post-caption">
        Nguyen Hoang Khoi and collaborators presenting their project on sheaf neural networks for structured representation learning.
      </figcaption>
    </figure>

      <p>
        In addition to their achievements at the conference, Pham Minh Khoi and Pham Quang Loc are also co-authors of a research paper presented at the 18th Asian Conference on Intelligent Information and Database Systems (ACIIDS 2026), held in Kaohsiung, Taiwan (April 13–15, 2026). The paper, entitled “Topology-Driven Rough Set Classification Using Ball Mapper Coverings for Healthcare Intelligence”, reflects their continued contributions to topology-based data analysis.
      </p>
      <p>
        These accomplishments demonstrate the students’ research capabilities and reflect the growing impact of topology-driven approaches in modern data science, bridging theoretical foundations with practical applications.
      </p>

    <div class="post-meta">

      <button type="button" class="share-facebook" data-postid="post-04">

    <p>
      On March 24, 2026, Dong Thap Department of Science and Technology convened a selection council meeting to evaluate a proposed provincial-level research project titled <strong>“Development of an Artificial Intelligence (AI) Model for Breast Cancer Diagnosis from Mammography and Preliminary Evaluation of Its Application Effectiveness”</strong>. The project is led by Dr. Bui Quang Thinh from the AMaDaS Research Group, Tien Giang University.
    </p>
   
    <figure class="post-figure">
      <img src="/img/blog/UngThuNhu/1.jpg" alt=" Specialist Level II Doctor Nguyen Van Linh." loading="lazy" />
      <figcaption class="post-caption">
        Dr. Bui Quang Thinh, the principal investigator, is presenting the project report at the meeting.      </figcaption>
    </figure>
    <p>
      The research team includes MSc. Nguyen Thanh Nha (scientific secretary), Dr. Duong Van Hieu, Specialist Doctor Vo Giap Hung, and MSc. Huynh Van Hiep. The project will be carried out in collaboration with key partners, including Tien Giang General Hospital, Dong Thap General Hospital, and TVT Medical Joint Stock Company, ensuring both scientific rigor and practical applicability.
    </p>
   <figure class="post-figure-group">
    <div class="post-figure-grid">
      <figure class="post-figure">
        <img src="/img/blog/UngThuNhu/2.jpg" alt="Dr. Lam Dong Phong." loading="lazy" />
      </figure>

      <figure class="post-figure">
        <img src="/img/blog/UngThuNhu/3.jpg" alt="Associate Professor Dr. Hoang Van Dung." loading="lazy" />
      </figure>

      <figure class="post-figure">
        <img src="/img/blog/UngThuNhu/4.jpg" alt="Dr. Nguyen Van Linh." loading="lazy" />
      </figure>

      <figure class="post-figure">
        <img src="/img/blog/UngThuNhu/5.jpg" alt="Dr. Le Hoang Hanh." loading="lazy" />
      </figure>
    </div>

      <figcaption class="post-caption post-caption-group">
        Dr. Lam Dong Phong (Can Tho University of Medicine and Pharmacy), Assoc. Prof. Dr. Hoang Van Dung<br> (Ho Chi Minh City University of Technology and Education), Dr. Nguyen Van Linh (Dong Thap Department of Health), <br>and Dr. Le Hoang Hanh (Tien Giang General Hospital) delivered remarks assessing the feasibility of the project <br>and proposing directions for its successful implementation.
      </figcaption>
  </figure>
      <p>
      The selection council was chaired by Dr. Le Quang Khoi, Director of Dong Thap Department of Science and Technology, with MSc. Nguyen Van Dam as Vice director, serving as Vice Chairman. The council also included experts and reviewers from leading institutions such as Can Tho University of Medicine and Pharmacy and Ho Chi Minh City University of Technology and Education, along with representatives from the provincial Department of Health. 
      </p>
    
       <p>
        According to Dr. Bui Quang Thinh, the project addresses the growing demand for artificial intelligence applications in healthcare, particularly in breast cancer imaging diagnosis—one of the leading causes of morbidity and mortality among women. Current mammography interpretation relies heavily on radiologists’ experience, which may result in missed early-stage lesions or diagnostic inconsistencies.
      </p>
      <figure class="post-figure-group">
          <div class="post-figure-grid post-figure-grid-2">
            <figure class="post-figure">
              <img src="/img/blog/UngThuNhu/6.jpg" alt="MSc. Phan Ha" loading="lazy" />
            </figure>

            <figure class="post-figure">
              <img src="/img/blog/UngThuNhu/7.jpg" alt="Le Hong Chau." loading="lazy" />
            </figure>
          </div>

          <figcaption class="post-caption post-caption-group">
            MSc. Phan Ha (Head of the Science Management Division, Dong Thap Department of Science and Technology) and Mr. Le Hong Chau<br> (Deputy Chief of Office, Dong Thap Department of Science and Technology) delivered remarks, highlighting key directions to be clarified <br>to ensure the effective implementation of the project.
          </figcaption>
        </figure>
      <p>
        The project aims to develop an advanced AI model capable of supporting physicians in breast cancer diagnosis from mammography images with high accuracy. It also seeks to conduct a preliminary evaluation of the system’s effectiveness in real clinical settings at partner hospitals. Key objectives include building a high-quality, well-annotated mammography dataset; developing robust AI models for lesion detection and classification; integrating explainable AI mechanisms to enhance transparency; and deploying pilot applications in clinical environments.
      </p>
    
      <p>
        During the evaluation session, the council reviewed the proposal through presentations, discussions, and critical assessments. The members highly appreciated the scientific significance and practical value of the project, particularly in the context of the rapid adoption of AI across multiple sectors. The project was approved with a score of 80.6.
      </p>

       <p>
        The council also provided recommendations for further refinement, including reconsidering the sample size to ensure representativeness, adjusting the project timeline, and expanding the data collection scope to enhance applicability. Additionally, the project title was suggested to be revised to better reflect the implementation context, resulting in the updated title: “Development of an Artificial Intelligence (AI) Model for Breast Cancer Diagnosis from Mammography and Preliminary Evaluation of Its Application Effectiveness in Dong Thap Province.”
      </p>
    <figure class="post-figure">
      <img src="/img/blog/UngThuNhu/11.jpg" alt=" Dr. Lam Dong Phong." loading="lazy" />

      <p>
        Overall, the project represents a significant step toward integrating AI into healthcare practice, contributing to earlier detection and improved diagnostic accuracy for breast cancer in Vietnam.
      </p>
