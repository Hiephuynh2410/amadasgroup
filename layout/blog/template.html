    <h1>Research Highlights and Academic Activities – Mar 2026</h1>
    <div class="post-meta">
      Mar 29, 2026 • 5 min read • by AMaDaS Research Group
      <!-- Share Facebook -->
      <button type="button" class="share-facebook" data-postid="post-03">
       <i class="fa-brands fa-facebook"></i> Facebook

    <p>
      In March 2026, the research group continued to achieve significant academic milestones with multiple research papers accepted in high-impact journals and prestigious international conferences. These outcomes demonstrate the group’s sustained contributions across decision-making under uncertainty, medical image analysis, fuzzy systems, and topological data analysis.
    </p>

    <p>
      On early March 2026, the manuscript <strong>Novel Neutrosophic Fuzzy Decision-Making Approach Based on Distance</strong> from the Average Solution under Uncertainty was accepted for publication in Engineering Applications of Artificial Intelligence (SCIE/Q1 journal). The study proposes an advanced neutrosophic fuzzy decision-making framework that enhances robustness in handling uncertainty in complex decision environments.
    </p>
  <figure class="post-figure">
      <img src="/img/blog/march_2026.jpg" alt="AMaDaS research group members attending FJCAI 2026 in Can Tho on March 27, 2026." loading="lazy" />
      <figcaption class="post-caption">
        AMaDaS research group members attending FJCAI 2026 in Can Tho on March 27, 2026.
      </figcaption>
    </figure>
     <p>
      The group also recorded success in applied data-driven research with the paper <strong>A Novel Farm-level Dataset and Real-Time Detection Framework for Shrimp Black Spot Disease</strong>, accepted for presentation at the 2026 IEEE-International Conference on Connected Innovation and Technology (IEEE-ICCITX.0 2026) (Scopus indexed). This work introduces a real-time detection system supported by a newly constructed dataset for aquaculture disease monitoring.
    </p>

      <p>
        In addition, the manuscript <strong>A Framework of Near-intuitionistic Fuzzy Soft Sets With Applications to Uncertainty-based Diagnosis</strong> was accepted in the Journal of Intelligent & Fuzzy Systems: Applications in Engineering and Technology (SCIE/Q4 journal), presenting a novel theoretical framework for uncertainty-based diagnostic systems.
      </p>

      <p>
        Further contributions include two papers accepted at the 11th International Conference on Information and Communication Technology for Intelligent Systems (ICTIS 2026) in Thailand (Scopus indexed). The first, <strong>Graph-guided Hierarchical Multi-class Decomposition for Intuitionistic Fuzzy Weighted Least Squares Twin Support Vector Machine</strong>, proposes a graph-guided learning strategy to improve classification performance in fuzzy environments. The second, <strong>Histogram-Based Cardiovascular Disease Risk Modeling</strong>, introduces a histogram-based modeling approach for assessing cardiovascular disease risk from clinical data.
      </p>
   
    <p>
      Moreover, two additional works were accepted at the 18th Asian Conference on Intelligent Information and Database Systems (ACIIDS 2026) in Taiwan (Scopus indexed with Rank B). The first,<strong>Topology-Based Rough Set Framework for Healthcare Analytics</strong>, introduces a topology-based rough set framework for healthcare analytics. The second, <strong>Fast-NSTBC: A Scalable Topological-based Clustering Method for Large Network-constrained Geospatial Data</strong>, presents an efficient clustering method tailored for large-scale geospatial datasets.
    </p>

    <p>
      In January 2026, the research group recorded several notable academic outcomes with three research manuscripts accepted for presentation at international and national conferences in the fields of artificial intelligence and computational intelligence. These achievements reflect the group’s ongoing research efforts spanning medical image analysis, topological data analysis, and time-series forecasting.
    </p>

    <p>
      On 09 January 2026, the manuscript <strong>A Novel Zigzag-Persistence-Based Framework for Topology-Enhanced Time-Series Forecasting</strong> was accepted for presentation at the 2nd International Conference on Computational Intelligence in Engineering Science (ICCIES 2026), an international conference to be held on 02–04 April 2026 in Vietnam. The study proposes a topology-enhanced forecasting framework that integrates zigzag persistence with deep learning to capture dynamic structural evolution in time-series data.
    </p>

    <figure class="post-figure">
      <img src="/img/blog/YEP.jpg" alt="Research highlights in January 2026" loading="lazy" />
      <figcaption class="post-caption">
        The AMaDaS research group and its scientific advisors.
      </figcaption>
    </figure>

    <p>
      On 30 January 2026, the paper <strong>Hotspot Detection on Distribution-Mapper Graphs</strong> was accepted by the 2026 FISU Joint Conference on Artificial Intelligence (FJCAI 2026), a national conference scheduled for 27–28 March 2026 in Vietnam. The work introduces a distribution-guided Mapper approach designed to improve the stability and effectiveness of hotspot detection in high-dimensional datasets.
    </p>

    <p>
      In addition, the manuscript <strong>A CNN–Vision Transformer Hybrid Framework for Brain Tumor MRI Image Classification</strong> was accepted for presentation at FJCAI 2026, a national conference. This study presents a hybrid CNN–Vision Transformer architecture for brain tumor classification from MRI images and reports strong experimental performance on a large public medical imaging dataset.
    </p>

    <p>
      Overall, these activities highlight the group’s sustained research productivity and its active engagement with both international and national academic venues, contributing to the advancement of artificial intelligence methodologies and their applications in data-driven analysis and healthcare.
    </p>

    <h1>AI Research Collaboration with Provincial General Hospitals</h1>
    <div class="post-meta">Feb 04, 2026 • 5 min read • by AMaDaS Research Group
      <!-- Share Facebook -->
      <button type="button" class="share-facebook" data-postid="post-01">
        <i class="fa-brands fa-square-facebook"></i> Facebook
      </button>

    <p>
      As part of its applied research activities, the AMaDaS Group of Tien Giang University has established a research collaboration with Tien Giang General Hospital and Dong Thap General Hospital to investigate the development of artificial intelligence (AI)–based models for supporting breast cancer diagnosis using medical imaging data.
      Within this collaboration, the AMaDaS group conducts research on the application of machine learning and deep learning techniques for medical image analysis, focusing on feature extraction and model construction to support breast cancer screening and diagnostic processes. The study aims to explore the feasibility of AI-assisted diagnostic support systems that can enhance diagnostic accuracy and efficiency in clinical practice.
    </p>

    <figure class="post-figure">
      <img src="/img/blog/Ai1.jpg" alt="AMaDaS collaboration meeting" loading="lazy" />

      </figcaption>
    </figure>

    <p>
      Collaboration with Tien Giang General Hospital and Dong Thap General Hospital provides access to practical clinical expertise and real-world medical contexts, thereby ensuring the applicability and relevance of the proposed AI models. The cooperation facilitates interdisciplinary knowledge exchange between researchers in applied mathematics and data science and healthcare professionals,
      contributing to the alignment of methodological development with clinical requirements.
    </p>

    <figure class="post-figure">
      <img src="/img/blog/AI2.jpg" alt="Clinical collaboration context" loading="lazy" />

    <p>
      This research collaboration reflects the practice-oriented and application-driven research direction of the AMaDaS group and Tien Giang University, and contributes to the advancement of artificial intelligence applications in healthcare, particularly in medical imaging–based diagnostic support, while strengthening sustainable university–hospital research partnerships.
    </p>
